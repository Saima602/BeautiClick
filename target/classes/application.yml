spring:
  datasource:
    url: ${DB_URL}
    username: ADMIN
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
   

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        
jwt:
   secret: ${JWT_SECRET}
   expiration-ms: 86400000   # 24 hours

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs